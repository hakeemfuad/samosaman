    <style>

        html.smooth-scroll {

    <script>
        // Prevent browser's default instant anchor jump as early as possible
        if (window.location.hash === '#locations') {
            history.scrollRestoration = 'manual';
        }
    </script>
    <script>
        lucide.createIcons();

        // Custom smooth scroll with configurable duration
        function smoothScrollTo(targetY, duration = 1500) {
            const startY = window.scrollY;
            const distance = targetY - startY;
            const startTime = performance.now();

            // Easing function (ease-out exponential) - starts slow, accelerates with momentum
            function easeOutExpo(t) {
                return 1 - Math.pow(2, -10 * t);
            }

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutExpo(progress);

                window.scrollTo(0, startY + distance * easedProgress);

                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            }

            requestAnimationFrame(step);
        }

        // Handle smooth scroll to #locations anchor with visible animation
        if (window.location.hash === '#locations') {
            // Disable CSS smooth scroll to prevent conflicts with our animation
            document.documentElement.classList.remove('smooth-scroll');

            // Prevent any scrolling until we're ready
            let scrollLocked = true;
            const preventScroll = (e) => {
                if (scrollLocked) {
                    e.preventDefault();
                }
            };
            window.addEventListener('scroll', preventScroll, { passive: false });

            // Wait for page to fully load, then animate
            window.addEventListener('load', () => {
                // Force scroll to top and lock it there
                window.scrollTo({ top: 0, behavior: 'instant' });

                // Wait for layout to stabilize after load event and multiple paint cycles
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            const locationsSection = document.getElementById('locations');
                            if (locationsSection) {
                                // Scroll to show the heading and locations section
                                // Use absolute positioning from top of document
                                const headingSection = document.querySelector('.relative.z-10.text-center');

                                // Adjust offset based on screen size (mobile navbar is smaller)
                                const isMobile = window.innerWidth < 768;
                                const navbarOffset = isMobile ? 0 : 100;

                                // Calculate absolute position from document top (not relative to current scroll)
                                const targetY = headingSection ?
                                    headingSection.offsetTop - navbarOffset :
                                    locationsSection.offsetTop - 150;

                                // Unlock scroll and start animation
                                scrollLocked = false;
                                window.removeEventListener('scroll', preventScroll);
                                smoothScrollTo(targetY, 600);
                            }
                        }, 300);
                    });
                });
            });
        }

        // 1. Define Branch Data
        const branches = [
            { name: "Burlington", state: "VT", lat: 44.5063, lng: -73.1788, url: "burlington.html" }
        ];

        // 2. Helper to Save Location to LocalStorage
        function saveLocationAndNavigate(branchName, branchState, url) {
            const locationData = {
                city: branchName,
                state: branchState
            };
            localStorage.setItem('samosaman_location', JSON.stringify(locationData));
            window.location.href = url;
        }

        // 3. Geolocation Logic
        const modalMessage = document.getElementById('modal-message');
        const confirmBtn = document.getElementById('confirm-location-btn');
        const cancelBtn = document.getElementById('cancel-location-btn');

        let pendingBranch = null;

        function toggleModalClasses(id, show) {
            const modal = document.getElementById(id);
            const backdrop = modal.querySelector('#location-backdrop') || modal.querySelector('.bg-black\\/50');
            const panel = modal.querySelector('#location-panel') || modal.querySelector('.transform');

            if (show) {
                modal.classList.remove('hidden');
                void modal.offsetWidth; // Force reflow
                if (backdrop) backdrop.classList.replace('opacity-0', 'opacity-100');
                if (panel) {
                    panel.classList.replace('opacity-0', 'opacity-100');
                    panel.classList.replace('translate-y-4', 'translate-y-0');
                    panel.classList.replace('sm:scale-100', 'sm:scale-100');
                }
            } else {
                if (backdrop) backdrop.classList.replace('opacity-100', 'opacity-0');
                if (panel) {
                    panel.classList.replace('opacity-100', 'opacity-0');
                    panel.classList.replace('translate-y-0', 'translate-y-4');
                    panel.classList.replace('sm:scale-100', 'sm:scale-95');
                }
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function initiateGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(onLocationSuccess, onLocationError);
            } else {
                console.log("Geolocation is not supported by this browser.");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const lastTrigger = localStorage.getItem('samosaman_last_geo_trigger');
            const ONE_HOUR = 60 * 60 * 1000;
            const now = Date.now();

            if (!lastTrigger || (now - parseInt(lastTrigger) > ONE_HOUR)) {
                localStorage.setItem('samosaman_last_geo_trigger', now);
                initiateGeolocation();
            }
        });

        document.getElementById('find-closest-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.setItem('samosaman_last_geo_trigger', Date.now());
            initiateGeolocation();
        });

        function onLocationSuccess(position) {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            let closestBranch = null;
            let minDistance = Infinity;

            branches.forEach(branch => {
                const dist = getDistanceFromLatLonInKm(userLat, userLng, branch.lat, branch.lng);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestBranch = branch;
                }
            });

            if (closestBranch) {
                pendingBranch = closestBranch;
                modalMessage.innerHTML = `Our <strong><u>${closestBranch.name}</u></strong> branch is closest to you.<br>Would you like to order from here?`;
                toggleModalClasses('location-modal', true);
            }
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function onLocationError(error) {
            console.error(error);
        }

        confirmBtn.addEventListener('click', () => {
            if (pendingBranch) {
                saveLocationAndNavigate(pendingBranch.name, pendingBranch.state, pendingBranch.url);
            }
        });

        cancelBtn.addEventListener('click', () => toggleModalClasses('location-modal', false));
    </script>
